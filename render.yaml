services:
  - type: web
    name: entregas-backend
    env: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install && npx tsc --project tsconfig.server.json
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: '*'
    healthCheckPath: /health
    autoDeploy: true
